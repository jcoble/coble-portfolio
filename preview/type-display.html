<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Display Type</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..600,0..100&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
body { margin:0; padding:24px; background:#0c0a18; color:#f3eef8; font-family:"Fraunces",serif; }
.lab { font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#ff3da6; margin-bottom:6px; }
.xl { font-size:62px; line-height:.92; letter-spacing:-.02em; font-weight:350; font-variation-settings:"opsz" 144,"SOFT" 30; margin-bottom:18px; }
.lg { font-size:36px; line-height:.95; letter-spacing:-.02em; font-weight:380; font-variation-settings:"opsz" 100,"SOFT" 30; }
.aur { background:linear-gradient(92deg,#ff3da6,#c84bff,#3de1ff); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 0 18px rgba(255,61,166,.35)); font-style:italic; }
</style></head><body>
<div class="lab">display-xl · Fraunces 350</div>
<div class="xl">Sharper systems, <span class="aur">made magic.</span></div>
<div class="lab">display-lg · Fraunces italic</div>
<div class="lg" style="font-style:italic">A retail EDI platform that <span class="aur">shows its work.</span></div>
</body></html>
