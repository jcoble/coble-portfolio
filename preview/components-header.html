<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Header</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
body { margin:0; padding:14px; background:radial-gradient(60% 40% at 14% 18%, rgba(122,61,255,.3), transparent 70%), #0c0a18; font-family:"Inter Tight",sans-serif; }
.h {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px; border-radius:14px; position:relative;
  border:1px solid #261e3a;
  background:rgba(12,10,24,.46);
  backdrop-filter:blur(20px);
  color:#f3eef8;
}
.h::after { content:""; position:absolute; left:14px; right:14px; bottom:0; height:1px; background:linear-gradient(92deg,transparent,#ff3da6,#c84bff,#3de1ff,transparent); opacity:.6; }
.left { display:flex; align-items:center; gap:12px; font-size:13px; font-weight:500; }
.mono { display:grid; place-items:center; width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,#ff3da6,#7a3dff); color:#fff; font-family:"JetBrains Mono",monospace; font-size:11px; box-shadow:0 0 16px rgba(255,61,166,.5); }
nav { display:flex; gap:2px; }
nav a { color:#b9b0c8; font-size:13px; padding:8px 12px; border-radius:8px; text-decoration:none; transition:.2s; }
nav a:hover, nav a.on { color:#f3eef8; background:rgba(255,61,166,.1); }
</style></head><body>
<header class="h">
  <div class="left">
    <span class="mono">JC</span>
    <span>Jesse Coble</span>
  </div>
  <nav>
    <a class="on">RetailReady</a>
    <a>AI</a>
    <a>Experience</a>
    <a>Contact</a>
  </nav>
</header>
</body></html>
