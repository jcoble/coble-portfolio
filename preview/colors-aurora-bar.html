<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Aurora Bar</title>
<style>
body { margin:0; padding:24px; background:#0c0a18; font-family:"JetBrains Mono",monospace; color:#b9b0c8; }
.label { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; margin-bottom:10px; }
.bar { height:4px; border-radius:2px; background:linear-gradient(92deg,#ff3da6 0%,#c84bff 38%,#7a3dff 64%,#3de1ff 100%); margin-bottom:18px; }
.bar.thin { height:2px; }
.bar.thick { height:8px; box-shadow:0 0 18px rgba(255,61,166,.45); }
.swatch { height:80px; border-radius:14px; background:linear-gradient(92deg,#ff3da6 0%,#c84bff 38%,#7a3dff 64%,#3de1ff 100%); box-shadow:0 0 50px rgba(200,75,255,.4); }
</style></head><body>
<div class="label">aurora bar · 2px hairline</div><div class="bar thin"></div>
<div class="label">aurora bar · 4px default</div><div class="bar"></div>
<div class="label">aurora bar · 8px glow</div><div class="bar thick"></div>
<div class="label">aurora fill · 92° linear</div><div class="swatch"></div>
</body></html>
