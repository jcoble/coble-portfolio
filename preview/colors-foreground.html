<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Foreground & Hairlines</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Inter+Tight:wght@400&display=swap" rel="stylesheet">
<style>
body { margin:0; padding:18px; background:#0c0a18; color:#f3eef8; font-family:"Inter Tight",sans-serif; }
.panel { background:rgba(28,21,48,.42); border:1px solid #261e3a; border-radius:14px; padding:14px; backdrop-filter:blur(10px); }
.item { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #261e3a; }
.item:last-child { border-bottom:0; }
.sw { width:36px; height:18px; border-radius:4px; }
.n { font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; }
.h { font-family:"JetBrains Mono",monospace; font-size:10px; color:#6e6580; }
</style></head><body>
<div class="panel">
  <div class="item"><div><div class="n" style="color:#f3eef8">--fg-moonlight</div><div class="h">#F3EEF8</div></div><div class="sw" style="background:#f3eef8"></div></div>
  <div class="item"><div><div class="n" style="color:#b9b0c8">--fg-haze</div><div class="h">#B9B0C8</div></div><div class="sw" style="background:#b9b0c8"></div></div>
  <div class="item"><div><div class="n" style="color:#6e6580">--fg-dim</div><div class="h">#6E6580</div></div><div class="sw" style="background:#6e6580"></div></div>
  <div class="item"><div><div class="n" style="color:#b9b0c8">--line</div><div class="h">#261E3A</div></div><div class="sw" style="background:#261e3a"></div></div>
  <div class="item"><div><div class="n" style="color:#b9b0c8">--line-glow</div><div class="h">#3A2A5A</div></div><div class="sw" style="background:#3a2a5a"></div></div>
</div>
</body></html>
