<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Brand · Monogram</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
body { margin:0; padding:24px; background:#0c0a18; color:#f3eef8; font-family:"Inter Tight",sans-serif; display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; align-items:center; }
.item { display:flex; flex-direction:column; align-items:center; gap:10px; }
.mono { width:88px; height:88px; border-radius:18px; display:grid; place-items:center; font-family:"JetBrains Mono",monospace; font-size:28px; font-weight:500; letter-spacing:-.02em; }
.aurora { background:linear-gradient(135deg,#ff3da6,#7a3dff); color:#fff; box-shadow:0 0 30px rgba(255,61,166,.55), inset 0 0 0 1px rgba(255,255,255,.18); }
.outline { background:rgba(28,21,48,.4); border:1px solid #3a2a5a; color:#f3eef8; backdrop-filter:blur(10px); }
.wordmark { font-family:"Fraunces",serif; font-size:34px; font-weight:380; letter-spacing:-.02em; line-height:1; font-variation-settings:"opsz" 100,"SOFT" 30; font-style:italic; }
.dot { color:#ff3da6; }
.role { font-family:"JetBrains Mono",monospace; font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:#6e6580; }
</style></head><body>
<div class="item"><div class="mono aurora">JC</div><div class="role">aurora · primary</div></div>
<div class="item"><div class="mono outline">JC</div><div class="role">outline · secondary</div></div>
<div class="item"><div class="wordmark">Jesse Coble<span class="dot">.</span></div><div class="role">wordmark · Fraunces</div></div>
</body></html>
