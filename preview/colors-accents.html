<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Aurora Accents</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Inter+Tight:wght@500&display=swap" rel="stylesheet">
<style>
body { margin:0; padding:18px; background:#0c0a18; font-family:"Inter Tight",sans-serif; }
.row { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
.s { border-radius:12px; height:108px; padding:12px; display:flex; flex-direction:column; justify-content:space-between; color:#f3eef8; position:relative; overflow:hidden; }
.n { font-family:"JetBrains Mono",monospace; font-size:9px; letter-spacing:0.16em; text-transform:uppercase; opacity:.95; }
.h { font-family:"JetBrains Mono",monospace; font-size:10px; opacity:.85; }
.r { font-size:10px; opacity:.8; line-height:1.3; }
.firefly { color:#0c0a18; }
</style></head><body>
<div class="row">
  <div class="s" style="background:#ff3da6; box-shadow:0 0 30px rgba(255,61,166,.55) inset, 0 0 30px rgba(255,61,166,.5)"><div><div class="n">magenta</div><div class="r">primary accent</div></div><div class="h">#FF3DA6</div></div>
  <div class="s" style="background:#c84bff; box-shadow:0 0 30px rgba(200,75,255,.55) inset"><div><div class="n">orchid</div><div class="r">secondary</div></div><div class="h">#C84BFF</div></div>
  <div class="s" style="background:#7a3dff; box-shadow:0 0 30px rgba(122,61,255,.55) inset"><div><div class="n">violet</div><div class="r">tertiary</div></div><div class="h">#7A3DFF</div></div>
  <div class="s" style="background:#3de1ff; box-shadow:0 0 30px rgba(61,225,255,.55) inset; color:#07060d"><div><div class="n">cyan</div><div class="r">signal · focus</div></div><div class="h">#3DE1FF</div></div>
  <div class="s firefly" style="background:#f9d976; box-shadow:0 0 30px rgba(249,217,118,.7) inset"><div><div class="n">firefly</div><div class="r">live · moon</div></div><div class="h">#F9D976</div></div>
</div>
</body></html>
