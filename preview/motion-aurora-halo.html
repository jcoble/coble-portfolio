<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Aurora Halo</title>
<style>
body { margin:0; background:#07060d; height:100vh; display:grid; place-items:center; overflow:hidden; }
.stage { position:relative; width:280px; height:140px; }
.halo { position:absolute; inset:-40px; border-radius:50%; background:conic-gradient(from 220deg at 50% 50%, rgba(255,61,166,0) 0%, rgba(255,61,166,.55) 14%, rgba(200,75,255,.65) 28%, rgba(122,61,255,.55) 42%, rgba(61,225,255,.45) 60%, rgba(255,61,166,0) 100%); filter:blur(40px); opacity:.85; animation:spin 14s linear infinite; }
@keyframes spin { to { transform:rotate(360deg) } }
h1 { position:relative; font-family:"Fraunces",serif; font-size:56px; line-height:1; font-weight:380; letter-spacing:-.02em; color:#f3eef8; margin:0; text-align:center; font-style:italic; }
.acc { background:linear-gradient(92deg,#ff3da6,#c84bff,#3de1ff); -webkit-background-clip:text; background-clip:text; color:transparent; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..500&display=swap" rel="stylesheet">
</head><body>
<div class="stage">
  <div class="halo"></div>
  <h1>Built in <span class="acc">aurora.</span></h1>
</div>
</body></html>
