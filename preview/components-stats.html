<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Stat Tile</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
body { margin:0; padding:18px; background:#0c0a18; color:#f3eef8; font-family:"Inter Tight",sans-serif; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:#261e3a; border-radius:14px; overflow:hidden; box-shadow:0 0 0 1px rgba(255,61,166,.08), 0 30px 80px -50px #000; }
.cell { background:#0c0a18; padding:18px 14px; position:relative; }
.v { font-family:"JetBrains Mono",monospace; font-size:42px; line-height:1; font-weight:500; letter-spacing:-.02em; background:linear-gradient(180deg,#f3eef8 0%, #b9b0c8 100%); -webkit-background-clip:text; background-clip:text; color:transparent; }
.l { font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#6e6580; margin-top:10px; }
.cell:nth-child(1)::after { content:""; position:absolute; left:0; top:0; bottom:0; width:2px; background:linear-gradient(180deg,#ff3da6,#c84bff); box-shadow:0 0 18px rgba(255,61,166,.6); }
</style></head><body>
<div class="grid">
  <div class="cell"><div class="v">5</div><div class="l">Active retailers</div></div>
  <div class="cell"><div class="v">52</div><div class="l">Entities</div></div>
  <div class="cell"><div class="v">40</div><div class="l">RLS-enforced tables</div></div>
  <div class="cell"><div class="v">~900</div><div class="l">Tests</div></div>
</div>
</body></html>
