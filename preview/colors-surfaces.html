<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Aurora Surfaces</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Inter+Tight:wght@500&display=swap" rel="stylesheet">
<style>
body { margin:0; padding:18px; background:#07060d; font-family:"Inter Tight",sans-serif; }
.row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.s { border-radius:12px; height:100px; padding:12px; display:flex; flex-direction:column; justify-content:space-between; color:#f3eef8; border:1px solid rgba(255,255,255,0.05); }
.n { font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; opacity:.85; }
.h { font-family:"JetBrains Mono",monospace; font-size:11px; opacity:.7; }
</style></head><body>
<div class="row">
  <div class="s" style="background:#07060d"><span class="n">--bg-void</span><span class="h">#07060D</span></div>
  <div class="s" style="background:#0c0a18"><span class="n">--bg-night</span><span class="h">#0C0A18</span></div>
  <div class="s" style="background:#15101f"><span class="n">--bg-bark</span><span class="h">#15101F</span></div>
  <div class="s" style="background:#1c1530"><span class="n">--bg-mist</span><span class="h">#1C1530</span></div>
</div>
</body></html>
