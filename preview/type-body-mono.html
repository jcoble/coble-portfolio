<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Body & Mono</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
body { margin:0; padding:20px; background:#0c0a18; color:#f3eef8; font-family:"Inter Tight",sans-serif; }
.row { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.lab { font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#ff3da6; margin-bottom:6px; }
.body-lg { font-size:18px; line-height:1.65; max-width:42ch; color:#f3eef8; }
.body { font-size:14px; line-height:1.6; color:#b9b0c8; max-width:46ch; margin-top:6px; }
.stat { font-family:"JetBrains Mono",monospace; font-size:42px; font-weight:500; letter-spacing:-.02em; line-height:1; color:#f3eef8; }
.stat-l { font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#6e6580; margin-top:8px; }
</style></head><body>
<div class="row">
  <div>
    <div class="lab">body-lg · 18 / 1.65</div>
    <p class="body-lg">RetailReady shows you the document, the validator output, the retransmission state, and the SLA clock — all live, all in one place.</p>
    <p class="body">body · secondary copy in --fg-haze for supporting context under headlines.</p>
  </div>
  <div>
    <div class="lab">mono · stat</div>
    <div class="stat">~900</div>
    <div class="stat-l">tests, default suite</div>
  </div>
</div>
</body></html>
